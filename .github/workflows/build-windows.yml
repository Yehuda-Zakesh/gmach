name: Build Windows exe

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Cache tauri-cli binary
        id: cache-tauri-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: tauri-cli-v2-${{ runner.os }}

      - name: Install Tauri CLI
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build (portable single exe)
        working-directory: src-tauri
        shell: pwsh
        run: |
          cargo tauri build 2>&1 | Tee-Object -FilePath "$env:GITHUB_WORKSPACE\build-log.txt"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Publish build log on failure
        if: failure()
        shell: pwsh
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git checkout --orphan build-log
          git rm -rf . 2>$null
          git add -f build-log.txt
          git commit -m "Build log (auto, run $env:GITHUB_RUN_ID)"
          git push -f origin build-log

      - name: Locate exe
        id: find
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" | Select-Object -First 1
          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload exe (build artifact, for CI history/debugging)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find.outputs.name }}
          path: ${{ steps.find.outputs.path }}

      # A GitHub Actions artifact requires a GitHub login and a few clicks
      # through the Actions tab to find, and expires after 90 days — not
      # something a non-technical end user can be expected to do. A Release
      # gives one permanent, public link that always points at the newest
      # build: https://github.com/<owner>/<repo>/releases/latest
      - name: Publish "latest" release with a stable download link
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "גמ\"ח תוכנה — הגרסה העדכנית"
          body: |
            הקובץ להורדה נמצא למטה תחת "Assets" — קובץ ה-exe יחיד, בלי צורך
            בהתקנה. נבנה אוטומטית מ-commit ${{ github.sha }}.
          make_latest: true
          prerelease: false
          files: ${{ steps.find.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
