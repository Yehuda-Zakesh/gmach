name: Build Windows exe

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build (portable single exe)
        working-directory: src-tauri
        shell: pwsh
        run: |
          cargo tauri build 2>&1 | Tee-Object -FilePath "$env:GITHUB_WORKSPACE\build-log.txt"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Publish build log on failure
        if: failure()
        shell: pwsh
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git checkout --orphan build-log
          git rm -rf . 2>$null
          Copy-Item "$env:GITHUB_WORKSPACE\build-log.txt" "build-log.txt" -Force
          git add build-log.txt
          git commit -m "Build log (auto, run $env:GITHUB_RUN_ID)"
          git push -f origin build-log

      - name: Locate exe
        id: find
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" | Select-Object -First 1
          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find.outputs.name }}
          path: ${{ steps.find.outputs.path }}
